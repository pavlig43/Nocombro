name: CI

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detekt:
    name: Detekt check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Run Detekt
        run: ./gradlew detektAll --continue
      - name: Upload Detekt reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-reports
          path: '**/build/reports/detekt/**'
          if-no-files-found: ignore

  mobile-unit:
    name: Mobile unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Check mobile task graph
        shell: bash
        run: |
          unit_graph="$(./gradlew :app:nocombroMobile:testDebugUnitTest --dry-run --console=plain)"
          if grep -Fq ':app:nocombroMobile:generateMobileSyncConfig' <<<"$unit_graph"; then
            echo 'Mobile unit tests must not depend on generateMobileSyncConfig.' >&2
            exit 1
          fi

          assets_graph="$(./gradlew :app:nocombroMobile:mergeDebugAssets --dry-run --console=plain)"
          grep -Fq ':app:nocombroMobile:generateMobileSyncConfig' <<<"$assets_graph"

          package_graph="$(./gradlew :app:nocombroMobile:packageDebug --dry-run --console=plain)"
          grep -Fq ':app:nocombroMobile:generateMobileSyncConfig' <<<"$package_graph"
      - run: ./gradlew :app:nocombroMobile:testDebugUnitTest

  desktop-smoke:
    name: Desktop smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew smokeDesktop --no-parallel --max-workers=1

  cloud-python:
    name: Cloud Python tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: cloud/reminder-email/functions/requirements.txt
      - name: Install dependencies
        run: python -m pip install -r cloud/reminder-email/functions/requirements.txt pytest
      - name: Run tests
        run: python -m pytest cloud/reminder-email
